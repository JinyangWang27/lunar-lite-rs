name: Tyme4rs compatibility spike

on:
  pull_request:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - tests/tyme4rs_compatibility.rs
      - .github/workflows/tyme4rs-spike.yml
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tyme4rs compatibility test
        shell: bash
        run: |
          set +e
          cargo test -q --test tyme4rs_compatibility --all-features -- --nocapture > /tmp/tyme4rs-compat.out 2>&1
          status=$?
          echo "$status" > /tmp/tyme4rs-compat.status
          tail -n 120 /tmp/tyme4rs-compat.out > /tmp/tyme4rs-compat-tail.txt
          cat /tmp/tyme4rs-compat-tail.txt
          exit 0
      - name: Comment compatibility result tail
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const fs = require('fs');
            const status = fs.readFileSync('/tmp/tyme4rs-compat.status', 'utf8').trim();
            const tail = fs.readFileSync('/tmp/tyme4rs-compat-tail.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Tyme4rs compatibility spike finished with status ${status}. Final output tail:\n\n\`\`\`text\n${tail.slice(0, 6000)}\n\`\`\``
            });
      - name: Fail if compatibility test failed
        shell: bash
        run: |
          status=$(cat /tmp/tyme4rs-compat.status)
          exit "$status"
